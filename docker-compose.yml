version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: leads-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - leads-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leads-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/leads_db
      - JWT_SECRET=docker_compose_super_secret_jwt_key
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - leads-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leads-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - leads-network

volumes:
  mongo_data:

networks:
  leads-network:
    driver: bridge
